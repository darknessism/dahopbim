        .level-0 .tree-cell-first { padding-left: 1rem; font-weight: 700; color: #0056D2; }

            width: 20px;

        // ================================================================
        // 2. FORMAT SỐ LIỆU
        // ================================================================
        const formatMoney = (amount) => {
            if (amount === 0 || amount === null || amount === undefined) return "-";
            return new Intl.NumberFormat('vi-VN').format(Math.round(amount));
        };

        const formatNum = (num) => {
            if (num === null || num === undefined) return "";
            return new Intl.NumberFormat('vi-VN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(num);
        };

        // ================================================================
        // 3. ROLLUP — Tính Khối lượng & Thành tiền từ Element lên Category
        // ================================================================
        function calculateRollup(nodes) {
            let totalCost = 0;

            nodes.forEach(node => {
                if (node.children && node.children.length > 0) {
                    const childSums = calculateRollup(node.children);

                    if (node.type === 'group') {
                        node.totalVolume = childSums.volume;
                        node.totalCost = node.totalVolume * (node.unitPrice || 0);
                    } else if (node.type === 'category') {
                        node.totalVolume = null; // Category không cộng khối lượng vì khác đơn vị
                        node.totalCost = childSums.cost;
                    }
                } else if (node.type === 'element') {
                    node.totalCost = null; // Chỉ hiện thành tiền ở cấp group
                }

                totalCost += (node.totalCost || 0);
            });

            const totalVolume = nodes.reduce((sum, n) => sum + (n.volume || n.totalVolume || 0), 0);
            return { cost: totalCost, volume: totalVolume };
        }

        // ================================================================
        // 4. STATE & HELPERS
        // ================================================================
        const tbody = document.getElementById('boqBody');
        const expandedState = {};
        let activeFilter = 'all';
        let searchTerm = '';

        function findNode(nodes, id) {
            for (const n of nodes) {
                if (n.id === id) return n;
                if (n.children) {
                    const found = findNode(n.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function matchesSearch(node) {
            const t = searchTerm.toLowerCase();
            return (node.name || '').toLowerCase().includes(t)
                || String(node.id || '').toLowerCase().includes(t)
                || String(node.wbs || '').toLowerCase().includes(t);
        }

        function nodeOrDescendantMatches(node) {
            if (matchesSearch(node)) return true;
            return (node.children || []).some(nodeOrDescendantMatches);
        }

        // ================================================================
        // 5. RENDER TREE-GRID (Đệ quy)
        // ================================================================
        function buildRows(nodes, level, out) {
            nodes.forEach(node => {
                if (searchTerm && !nodeOrDescendantMatches(node)) return;

                const isLeaf = !node.children || node.children.length === 0;
                if (expandedState[node.id] === undefined) expandedState[node.id] = (level < 2);
                const isExpanded = searchTerm ? true : expandedState[node.id];

                const expandIcon = isLeaf
                    ? `<span class="inline-block w-4 h-4 ml-1 mr-1 text-[9px] text-[#C4CCD4] text-center"><i class="fa-solid fa-circle"></i></span>`
                    : `<span class="expand-btn ${isExpanded ? 'expanded' : ''}"><i class="fa-solid fa-chevron-right text-xs"></i></span>`;

                const syncBtn = (node.type === 'element' || node.type === 'group')
                    ? `<button class="btn-highlight text-[#8C8C8C] hover:text-[#1FA15F] p-1.5 rounded transition-all" onclick="highlight3D('${node.id}', event)" title="Hiển thị trên mô hình 3D"><i class="fa-solid fa-eye"></i></button>`
                    : '';

                const volumeCell = node.type === 'element' ? formatNum(node.volume)
                    : node.type === 'group' ? formatNum(node.totalVolume) : '';

                const priceCell = node.type === 'group'
                    ? `<span class="price-editable" onclick="startEditPrice('${node.id}', event)" title="Click để sửa đơn giá">${formatMoney(node.unitPrice)}</span>`
                    : '-';

                const costCell = node.totalCost != null ? formatMoney(node.totalCost) : '-';
                const costClass = node.type === 'category' ? 'text-[#0056D2] font-bold' : 'text-[#1FA15F]';
                const idBadge = node.type === 'element'
                    ? `<span class="ml-2 text-[10px] font-mono text-[#8C8C8C] bg-[#F5F7F9] px-1.5 py-0.5 rounded">#${node.id}</span>` : '';

                out.push(`
                    <tr class="tree-row level-${level} ${node.type === 'category' ? 'bg-[#F5F7F9]' : ''} ${isLeaf ? 'leaf-node' : ''} text-[#1F1F1F]"
                        ${!isLeaf ? `onclick="toggleRow('${node.id}', event)" style="cursor:pointer"` : ''} data-rowid="${node.id}">
                        <td class="py-2.5 px-4 tree-cell-first">
                            <div class="flex items-center">
                                ${expandIcon}
                                <span class="font-mono text-xs mr-2 opacity-50 w-12 shrink-0">${node.wbs || ''}</span>
                                <span>${node.name}</span>
                                ${idBadge}
                            </div>
                        </td>
                        <td class="py-2.5 px-4 text-center text-[#5C5C5C]">${node.unit || ''}</td>
                        <td class="py-2.5 px-4 text-right font-mono text-[#5C5C5C]">${volumeCell}</td>
                        <td class="py-2.5 px-4 text-right font-mono text-[#5C5C5C]">${priceCell}</td>
                        <td class="py-2.5 px-4 text-right font-mono ${costClass}">${costCell}</td>
                        <td class="py-2.5 px-4 text-center">${syncBtn}</td>
                    </tr>`);

                if (!isLeaf && isExpanded) buildRows(node.children, level + 1, out);
            });
        }

        function renderTable() {
            calculateRollup(boqData);
            const roots = activeFilter === 'all' ? boqData : boqData.filter(c => c.filter === activeFilter);
            const out = [];
            buildRows(roots, 0, out);
            tbody.innerHTML = out.length ? out.join('')
                : `<tr><td colspan="6" class="py-10 text-center text-[#8C8C8C]"><i class="fa-solid fa-magnifying-glass mr-2"></i>Không tìm thấy hạng mục phù hợp</td></tr>`;
            const total = roots.reduce((s, c) => s + (c.totalCost || 0), 0);
            document.getElementById('grandTotal').textContent = formatMoney(total) + ' ₫';
        }

        // ================================================================
        // 6. TƯƠNG TÁC — Expand / 3D Sync / Sửa đơn giá
        // ================================================================
        function toggleRow(id, event) {
            if (event) event.stopPropagation();
            expandedState[id] = !expandedState[id];
            renderTable();
        }

        function highlight3D(id, event) {
            event.stopPropagation();
            const btn = event.currentTarget;
            document.querySelectorAll('.btn-highlight.active').forEach(b => { if (b !== btn) b.classList.remove('active'); });
            btn.classList.toggle('active');
            btn.closest('tr').classList.toggle('active', btn.classList.contains('active'));
        }

        function startEditPrice(id, event) {
            event.stopPropagation();
            const node = findNode(boqData, id);
            if (!node) return;
            const span = event.currentTarget;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = node.unitPrice;
            span.replaceWith(input);
            input.focus();
            input.select();

            const commit = () => {
                const val = parseFloat(String(input.value).replace(/[^\d.]/g, ''));
                if (!isNaN(val) && val >= 0) node.unitPrice = val;
                renderTable();
            };
            input.addEventListener('blur', commit);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') input.blur();
                if (e.key === 'Escape') { input.removeEventListener('blur', commit); renderTable(); }
            });
            input.addEventListener('click', e => e.stopPropagation());
        }

        // ================================================================
        // 7. FILTER TABS & SEARCH
        // ================================================================
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeFilter = btn.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => {
                    const on = b === btn;
                    b.className = 'filter-btn px-3 py-1.5 rounded whitespace-nowrap transition-colors ' + (on
                        ? 'bg-[#E3EDFC] text-[#0056D2] border border-[#B9D2F5] font-medium'
                        : 'bg-[#F5F7F9] hover:bg-[#E7ECF1] text-[#5C5C5C] border border-transparent');
                });
                renderTable();
            });
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            searchTerm = e.target.value.trim();
            renderTable();
        });

        // ================================================================
        // 8. XUẤT EXCEL (CSV có BOM, mở trực tiếp bằng Excel)
        // ================================================================
        function walkForExport(nodes, out) {
            nodes.forEach(node => {
                out.push([
                    node.wbs || '', node.type === 'element' ? node.id : '', node.name,
                    node.unit || '',
                    node.type === 'element' ? node.volume : (node.totalVolume ?? ''),
                    node.type === 'group' ? node.unitPrice : '',
                    node.totalCost ?? ''
                ]);
                if (node.children) walkForExport(node.children, out);
            });
        }

        document.getElementById('btnExport').addEventListener('click', () => {
            calculateRollup(boqData);
            const rows = [['WBS', 'Ma cau kien', 'Hang muc cong viec', 'Don vi', 'Khoi luong', 'Don gia (VND)', 'Thanh tien (VND)']];
            walkForExport(boqData, rows);
            const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(';')).join('\r\n');
            const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'BOQ_ChungCu_TechHubTower.csv';
            a.click();
            URL.revokeObjectURL(a.href);
        });

        // ================================================================
        // 9. KHỞI TẠO
        // ================================================================
        renderTable();
    </script>
</body>
</html>
